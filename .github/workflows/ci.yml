name: Cloud Inventory CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # We could spin up MySQL and MongoDB here, but we are using SQLite in-memory for basic API checks in pytest
      # to keep the pipeline fast. MongoDB operations will be mocked or fail gracefully in tests.
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Test with pytest
      env:
        MONGO_URI: mongodb://localhost:27017/
      run: |
        # Set PYTHONPATH so src modules are discoverable
        PYTHONPATH=$PYTHONPATH:. pytest tests/

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build . --file Dockerfile --tag cloud-inventory-backend:latest
      
    # Example pushing step (dry-run to echo)
    - name: Push to Registry (Mock)
      run: echo "docker push your-registry/cloud-inventory-backend:latest"
